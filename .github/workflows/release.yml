name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build Mac DMGs
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build DMGs (arm64 + x64)
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build

      - name: Ad-hoc sign DMGs
        run: codesign --force --deep --sign - app/dist/*.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: app/dist/*.dmg

  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build AppImages + debs (arm64 + x64)
        working-directory: app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            app/dist/*.AppImage
            app/dist/*.deb

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build Windows installer (x64)
        working-directory: app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: app/dist/*.exe

  release:
    name: Publish release
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" > release-notes.md

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }} — VDO.Spacial.Comms"
          body_path: release-notes.md
          files: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/sha256sums.txt
          fail_on_unmatched_files: true
